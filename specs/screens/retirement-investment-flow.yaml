version: "2.0"

screen:
  name: 투자흐름 (2번탭)
  route: /retirement?tab=investment-flow
  layout: full-width
  auth: true

data_requirements:
  - resource: investment_records
    needs: [id, product_name, investment_amount, evaluation_amount, return_rate, status, start_date, end_date, predecessor_id, successor_id, memo, record_type]
    filters: { customer_id: "?customer_id", year: "?year", status: "?status" }

  - resource: wrap_accounts
    needs: [id, product_name, securities_company, investment_target, target_return_rate]
    filters: { is_active: true }

components:
  - id: view_toggle
    type: navigation
    position: main
    function: 테이블 뷰 / 타임라인 뷰 전환
    events:
      - on: click:toggle
        do: 뷰 모드 전환 (같은 데이터, 다른 시각화)

  - id: annual_flow_table
    type: list
    position: main
    function: 연간 투자흐름표 (연도/연차/나이/일시납/연적립/총납입/연간총수익/연간평가액/연수익률/인출액/누적인출액/총평가금액)
    data_source:
      resource: investment_records
    events:
      - on: change:year
        do: 선택 연도의 투자흐름 데이터 표시

  - id: investment_record_table
    type: list
    position: main
    function: 투자기록 테이블 (상품명/투자금액/평가금액/수익률/상태/시작일/종료일/연결상품)
    data_source:
      resource: investment_records
    events:
      - on: click:link_product
        do: 연결된 상품 행으로 스크롤 + 하이라이트
      - on: click:status_toggle
        do: ing→exit 변경 시 종료일/평가금액 입력 팝업

  - id: record_filter
    type: navigation
    position: main
    function: 투자기록 필터 (전체/운용중/종결/적립)
    events:
      - on: click:filter
        do: 선택한 상태로 투자기록 필터링

  - id: add_record_modal
    type: form
    position: overlay
    function: 투자기록 추가 모달 (유형/상품/금액/시작일/상태/연결정보/메모)
    data_source:
      resource: wrap_accounts
    events:
      - on: submit
        do: 투자기록 저장, 연간 투자흐름표 자동 업데이트

  - id: timeline_view
    type: detail
    position: main
    function: 타임라인 시각화 (시간순 투자 흐름, 상품 간 연결 화살표, 적립 이벤트)
    data_source:
      resource: investment_records

connections:
  navigations:
    - from: add_record_modal
      to: /data-management/wrap-accounts
  shared_components:
    - customer_selector
    - tab_navigation
  external:
    - auth

tests:
  - name: 초기 로드
    when: 고객 선택 후 2번탭 접속
    then:
      - 연간 투자흐름표 표시 (현재 연도)
      - 투자기록 테이블 표시

  - name: 투자기록 추가
    when: 추가 버튼 클릭 후 신규투자 기록 입력
    then:
      - 모달에서 상품 드롭다운 표시 (랩어카운트 관리 상품 목록)
      - 저장 후 테이블에 새 기록 표시
      - 연간 투자흐름표 자동 업데이트

  - name: 연결상품 추적
    when: 연결상품 컬럼의 #2 클릭
    then:
      - 해당 상품 행으로 스크롤
      - 행 하이라이트 표시

  - name: 타임라인 뷰 전환
    when: 타임라인 뷰 토글 클릭
    then:
      - 시간축 기반 투자 흐름 시각화
      - 상품 간 연결 화살표 표시
