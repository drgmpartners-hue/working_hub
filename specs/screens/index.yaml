version: "2.0"

screens:
  - name: 로그인
    route: /login
    file: login.yaml
    auth: false

  - name: 대시보드
    route: /dashboard
    file: dashboard.yaml
    auth: true

  - name: Dr.GM 수당정산 계산기
    route: /commission/dr-gm
    file: commission-dr-gm.yaml
    auth: true

  - name: 증권사 수당정산 계산기
    route: /commission/securities
    file: commission-securities.yaml
    auth: true

  - name: IRP 포트폴리오 수익률 관리기
    route: /portfolio/irp
    file: portfolio-irp.yaml
    auth: true

  - name: 주식/ETF 추천 프로그램
    route: /investment/stock-recommend
    file: stock-recommend.yaml
    auth: true

  - name: 카드뉴스 제작
    route: /content/card-news
    file: content-card-news.yaml
    auth: true

  - name: 보고서 제작
    route: /content/report
    file: content-report.yaml
    auth: true

  - name: 표지/홍보페이지 디자인
    route: /content/cover-promo
    file: content-cover-promo.yaml
    auth: true

  # === Wrap Retirement (랩 은퇴설계) ===

  - name: 희망 은퇴플랜 (1번탭)
    route: /retirement?tab=desired-plan
    file: retirement-desired-plan.yaml
    auth: true

  - name: 투자흐름 (2번탭)
    route: /retirement?tab=investment-flow
    file: retirement-investment-flow.yaml
    auth: true

  - name: 은퇴플랜 (3번탭)
    route: /retirement?tab=retirement-plan
    file: retirement-plan.yaml
    auth: true

  - name: 인터랙티브 계산기 (4번탭)
    route: /retirement?tab=interactive-calc
    file: retirement-interactive-calc.yaml
    auth: true

  - name: 연금수령 계획 (5번탭)
    route: /retirement?tab=pension-plan
    file: retirement-pension-plan.yaml
    auth: true

  - name: 랩어카운트 관리
    route: /data-management/wrap-accounts
    file: wrap-account-mgmt.yaml
    auth: true

categories:
  - name: 업무 자동화
    screens: [commission-dr-gm, commission-securities]

  - name: 투자 분석
    screens: [portfolio-irp, stock-recommend, retirement-desired-plan, retirement-investment-flow, retirement-plan, retirement-interactive-calc, retirement-pension-plan]

  - name: 콘텐츠 제작
    screens: [content-card-news, content-report, content-cover-promo]

  - name: Data 관리
    screens: [wrap-account-mgmt]
