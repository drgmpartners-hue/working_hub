version: "2.0"

enums:
  calc_type:
    values: [dr_gm, securities]
    used_in: [commission_calculations]

  content_type:
    values: [card_news, report, cover_promo]
    used_in: [content_projects]

  crawling_source_type:
    values: [securities_commission, irp_portfolio]
    used_in: [crawling_jobs]

  ai_provider:
    values: [claude, gemini]
    used_in: [ai_api_settings]

  job_status:
    values: [pending, processing, completed, error]
    used_in: [commission_calculations, crawling_jobs, portfolio_analyses, content_projects]

  product_type:
    values: [pension, irp]
    used_in: [portfolio_items]

  # === Wrap Retirement enums ===

  investment_record_type:
    values: [investment, additional_savings, withdrawal]
    used_in: [investment_records]

  investment_status:
    values: [ing, exit, deposit]
    used_in: [investment_records]

  pension_type:
    values: [lifetime, fixed, inheritance]
    used_in: [pension_plans]

common_patterns:
  file_download:
    description: 파일 생성 후 다운로드
    event: click:download
    used_in:
      - commission-dr-gm (명세서)
      - commission-securities (보고서)
      - portfolio-irp (PDF 보고서)
      - content-card-news (카드뉴스 이미지)
      - content-report (보고서 파일)
      - content-cover-promo (디자인 파일)

  excel_upload:
    description: 엑셀 파일 업로드 및 파싱
    event: drop:file
    resource: file_uploads
    used_in:
      - commission-dr-gm
      - commission-securities
      - portfolio-irp

  ai_content_generation:
    description: AI 텍스트 콘텐츠 생성 → 검토 → 승인 → 디자인 생성
    steps: [input, generate, review, approve, design, edit, download]
    used_in:
      - content-card-news
      - content-report
      - content-cover-promo

  # === Wrap Retirement patterns ===

  compound_calculation:
    description: 복리 계산 기반 시뮬레이션 (백엔드에서만 실행)
    used_in:
      - retirement-desired-plan (목표 역산)
      - retirement-plan (연도별 예상)
      - retirement-interactive-calc (수정 예측)
      - retirement-pension-plan (연금 수령 계산)

  tab_data_flow:
    description: 탭 간 데이터 흐름 (저장 시 다른 탭에 반영)
    flows:
      - from: tab1_desired_plan
        to: [tab3_retirement_plan, tab4_interactive_calc]
      - from: tab2_investment_flow
        to: [tab4_interactive_calc]
      - from: tab3_retirement_plan
        to: [tab4_interactive_calc, tab5_pension_plan]
      - from: tab4_interactive_calc
        to: [tab5_pension_plan]
