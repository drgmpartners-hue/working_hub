version: "2.0"

shared_components:
  header_bar:
    type: navigation
    position: header
    function: 로고, 홈 버튼, 프로필/로그아웃 표시
    used_in:
      - dashboard
      - commission-dr-gm
      - commission-securities
      - portfolio-irp
      - stock-recommend
      - content-card-news
      - content-report
      - content-cover-promo
    data_source:
      resource: users
    events:
      - on: click:logo
        do: /dashboard로 이동
      - on: click:logout
        do: 로그아웃 API 호출, /login으로 이동

  tab_navigation:
    type: navigation
    position: main
    function: 탭 기반 화면 내 전환
    used_in:
      - commission-dr-gm (2탭)
      - commission-securities (3탭)
      - portfolio-irp (3탭)
    events:
      - on: click:tab
        do: 해당 탭 활성화

  data_source_selector:
    type: form
    position: main
    function: 크롤링 실행 또는 엑셀 업로드 선택
    used_in:
      - commission-securities
      - portfolio-irp
    events:
      - on: click:crawl
        do: 크롤링 작업 시작, 진행 상태 표시
      - on: drop:file
        do: 엑셀 파일 업로드 및 파싱

  ai_provider_selector:
    type: form
    position: main
    function: AI 서비스 선택 (Claude/Gemini)
    used_in:
      - content-card-news
      - content-report
      - content-cover-promo
    data_source:
      resource: ai_api_settings
    events:
      - on: change:ai_provider
        do: 사용할 AI 서비스 변경

  ai_text_review:
    type: detail
    position: main
    function: AI가 작성한 글 콘텐츠 검토/수정
    used_in:
      - content-card-news
      - content-report
      - content-cover-promo
    data_source:
      resource: content_versions
    events:
      - on: click:approve
        do: 글 승인, 디자인 생성 시작
      - on: click:edit
        do: 텍스트 수정 모드
      - on: click:regenerate
        do: AI 재생성 요청
